<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <script type="text/javascript" src="./measurements_files/loader.js.download"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart', 'table']});
      google.charts.setOnLoadCallback(init);

      function init() {
        drawChartAndTable() // initial call (onkohan tarpeen)
        setInterval(drawChartAndTable, 1000)
      }

      function drawChartAndTable () {
        // haetaan data palvelimelta (HTTP GET)
         fetch('http://localhost:5000/api/measurements')
            .then((response) => {
            return response.json();
        })
        .then((dataFromServer) => {
            console.log(dataFromServer)
            // kutsu drawChartia
            drawChart(dataFromServer)
            // kutsu drawTablea
            drawTable(dataFromServer)
        })
      }

      function drawTable(dataFromServer) {
          var datatable = new google.visualization.DataTable();
          datatable.addColumn("number", "aika")
          datatable.addColumn("number", "paine")
          datatable.addColumn("number", "lampotila")
          datatable.addColumn("number", "kosteus")
          datatable.addRows(dataFromServer)

          // https://developers.google.com/chart/interactive/docs/gallery/table 
          var table = new google.visualization.Table(document.getElementById('table_div'));
          table.draw(datatable, {showRowNumber: true, width: '100%', height: '100%'});
      }

      function drawChart(dataFromServer) { // PPT: sivut 39 ja 40
          var datatable = new google.visualization.DataTable();
          datatable.addColumn("number", "aika")
          datatable.addColumn("number", "paine")
          datatable.addColumn("number", "lampotila")
          datatable.addColumn("number", "kosteus")
          datatable.addRows(dataFromServer)
          
          var options = {
            title: 'Company Performance',
            curveType: 'function',
            legend: { position: 'bottom' }
          };

          var chart = new google.visualization.LineChart(document.getElementById('curve_chart'));

          chart.draw(datatable, options);
      }
    </script><script type="text/javascript" charset="UTF-8" src="./measurements_files/loader(1).js.download"></script>

    <div id="curve_chart" style="width: 900px; height: 500px"></div>

</body></html>
